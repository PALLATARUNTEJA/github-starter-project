name: My First GitHub Action Bot

on:
  # ⏰ SCHEDULER: Runs automatically every 15 minutes!
  schedule:
    - cron: '*/15 * * * *'

  # 🚀 PUSH: Runs whenever code is pushed to main
  push:
    branches: [ "main" ]

  # 🖐️ MANUAL: Allows manual button click in GitHub UI
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Download our code to the virtual computer
        uses: actions/checkout@v4

      - name: 2. Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Run the python script!
        run: python ping.py
